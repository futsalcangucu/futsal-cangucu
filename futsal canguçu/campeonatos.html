<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campeonatos — Futsal Canguçu 2026</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="court-lines" aria-hidden="true"></div>
  <div id="header-root"></div>

  <main>
    <section>
      <div class="wrap">
        <div class="crumbs">
          <a href="index.html">Início</a>
          <span class="sep">/</span>
          <span>Campeonatos</span>
        </div>

        <div class="section-head">
          <h2>Campeonatos</h2>
        </div>

        <div id="camp-list"></div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    document.getElementById('header-root').innerHTML = UI.buildHeader('campeonatos.html');
    document.getElementById('footer-root').innerHTML = UI.buildFooter();

    const container = document.getElementById('camp-list');

    container.innerHTML = Object.values(CAMPEONATOS).map(camp => {
      const cats = Object.values(camp.categorias);
      const totalJogos   = cats.reduce((s,c) => s + c.jogos.length, 0);
      const realizados   = cats.reduce((s,c) => s + c.jogos.filter(j =>
        j.golsMandante !== null && j.golsMandante !== undefined).length, 0);
      const totalEquipes = cats.reduce((s,c) =>
        s + Object.values(c.grupos).reduce((ss,eq) => ss + eq.length, 0), 0);

      const catCards = cats.map(cat => {
        const nGrupos = Object.keys(cat.grupos).length;
        const nEq     = Object.values(cat.grupos).reduce((s,e) => s + e.length, 0);
        return `<a href="categoria.html?camp=${camp.id}&cat=${cat.slug}"
             class="card cat"
             style="--accent:${cat.accent};">
          <div class="tag">Categoria</div>
          <h3>${cat.nome}</h3>
          <div class="meta">
            <span>${nGrupos} grupo${nGrupos>1?'s':''}</span>
            <span>${nEq} equipes</span>
          </div>
          <div class="go">Ver →</div>
        </a>`;
      }).join('');

      return `<div class="card" style="margin-bottom:32px;">
        <div class="tag">Campeonato</div>
        <h3 style="font-size:1.5rem;margin-bottom:6px;">${camp.nome}</h3>
        <p style="margin-bottom:18px;">${camp.descricao}</p>
        <div class="meta" style="margin-bottom:20px;">
          <span>${cats.length} categorias</span>
          <span>${totalEquipes} equipes</span>
          <span>${realizados} / ${totalJogos} jogos realizados</span>
        </div>
        <div class="grid">${catCards}</div>
      </div>`;
    }).join('');
  </script>
</body>
</html>
