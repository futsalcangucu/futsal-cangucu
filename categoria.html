<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoria — Futsal Canguçu 2026</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .layout-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 720px) {
      .layout-cols { grid-template-columns: 1fr; }
    }
    .panel-head {
      font-family: var(--f-mono);
      font-size: .7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      margin: 0 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-head::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .view-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .view-toggle button {
      font-family: var(--f-mono);
      font-size: .76rem;
      letter-spacing: .5px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink-dim);
      cursor: pointer;
      transition: all .12s;
    }
    .view-toggle button.active {
      background: var(--surface-2);
      border-color: var(--gold-dim);
      color: var(--ink);
    }
    .group-section { margin-bottom: 40px; }
  </style>
</head>
<body>
  <div class="court-lines" aria-hidden="true"></div>
  <div id="header-root"></div>

  <main>
    <section>
      <div class="wrap">
        <div class="crumbs" id="crumbs"></div>
        <div class="cat-band" id="cat-band"></div>

        <!-- Abas de grupo -->
        <div class="group-tabs" id="group-tabs"></div>

        <!-- Alternância de visão -->
        <div class="view-toggle">
          <button id="btn-ambos"  class="active" onclick="setView('ambos')">Classificação + Jogos</button>
          <button id="btn-tabela" onclick="setView('tabela')">Só classificação</button>
          <button id="btn-jogos"  onclick="setView('jogos')">Só jogos</button>
        </div>

        <div id="content-root"></div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/engine.js"></script>
  <script src="assets/js/ui.js"></script>
  <script>
    document.getElementById('header-root').innerHTML = UI.buildHeader('campeonatos.html');
    document.getElementById('footer-root').innerHTML = UI.buildFooter();

    const campId  = UI.getParam('camp') || 'municipal-2026';
    const catSlug = UI.getParam('cat')  || 'ouro';

    const camp = CAMPEONATOS[campId];
    const cat  = camp && camp.categorias[catSlug];

    if (!camp || !cat) {
      document.getElementById('content-root').innerHTML =
        `<div class="empty-state">Categoria não encontrada.</div>`;
    } else {
      // Breadcrumb
      document.getElementById('crumbs').innerHTML =
        `<a href="index.html">Início</a>
         <span class="sep">/</span>
         <a href="campeonatos.html">Campeonatos</a>
         <span class="sep">/</span>
         <a href="campeonatos.html">${camp.nome}</a>
         <span class="sep">/</span>
         <span>${cat.nome}</span>`;

      // Band (cabeçalho da categoria)
      const nEq = Object.values(cat.grupos).reduce((s,e) => s + e.length, 0);
      const nG  = Object.keys(cat.grupos).length;
      const info = cat.info && cat.info.length
        ? `<ul class="rules">${cat.info.map(r => `<li>${r}</li>`).join('')}</ul>` : '';
      document.getElementById('cat-band').innerHTML =
        `<div>
           <h1>${cat.nome}</h1>
           <p style="color:var(--ink-dim);font-size:.85rem;margin:0;">${camp.nome}</p>
         </div>
         <div style="text-align:right;min-width:180px;">
           ${info}
           <div style="font-family:var(--f-mono);font-size:.72rem;color:var(--ink-dim);margin-top:10px;">
             ${nG} grupo${nG>1?'s':''} · ${nEq} equipes
           </div>
         </div>`;

      // Lê config de classificação do data.js (com fallback seguro)
      const config = cat.classificacao || { diretos: 2, terceiros: false, rebaixados: 0 };

      let currentView  = 'ambos';
      let currentGroup = Object.keys(cat.grupos)[0];

      const tabContainer = document.getElementById('group-tabs');

      function renderTabs() {
        const grupoKeys = Object.keys(cat.grupos);
        const todoBtn = grupoKeys.length > 1
          ? `<button class="${currentGroup === 'TODOS' ? 'active' : ''}"
                     onclick="setGroup('TODOS')">Todos os grupos</button>`
          : '';
        tabContainer.innerHTML =
          grupoKeys.map(g =>
            `<button class="${g === currentGroup ? 'active' : ''}"
                     onclick="setGroup('${g}')">Grupo ${g}</button>`
          ).join('') + todoBtn;
      }

      function setGroup(g) { currentGroup = g; renderTabs(); renderContent(); }

      function setView(v) {
        currentView = v;
        ['ambos','tabela','jogos'].forEach(id => {
          document.getElementById('btn-' + id).classList.toggle('active', id === v);
        });
        renderContent();
      }

      window.setGroup = setGroup;
      window.setView  = setView;

      function renderContent() {
        const gruposParaRender = currentGroup === 'TODOS'
          ? Object.keys(cat.grupos)
          : [currentGroup];

        const html = gruposParaRender.map(g => {
          const equipes = cat.grupos[g];
          const classif = Engine.calcularClassificacao(g, equipes, cat.jogos);

          let tabelaHtml   = '';
          let partidasHtml = '';

          if (currentView === 'tabela' || currentView === 'ambos') {
            tabelaHtml = `<div>
              <p class="panel-head">Classificação</p>
              ${Engine.htmlClassificacao(classif, g, config)}
            </div>`;
          }
          if (currentView === 'jogos' || currentView === 'ambos') {
            partidasHtml = `<div>
              <p class="panel-head">Partidas</p>
              ${Engine.htmlPartidas(cat.jogos, g)}
            </div>`;
          }

          const inner = currentView === 'ambos'
            ? `<div class="layout-cols">${tabelaHtml}${partidasHtml}</div>`
            : tabelaHtml + partidasHtml;

          const groupTitle = gruposParaRender.length > 1
            ? `<h4 style="font-family:var(--f-display);text-transform:uppercase;font-size:1rem;margin:0 0 16px;color:var(--gold-dim);">Grupo ${g}</h4>`
            : '';

          return `<div class="group-section reveal">${groupTitle}${inner}</div>`;
        }).join('');

        document.getElementById('content-root').innerHTML = html;
      }

      renderTabs();
      renderContent();
    }
  </script>
</body>
</html>
